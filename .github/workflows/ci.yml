# PR/push gate: `nix flake check` builds the server with the full go test
# suite in the check phase — one command, same derivation the release ships.
# Runs on ubuntu-latest and macos-15 so the darwin build (cgo + vendored
# tree-sitter) is proven on every push/PR, not first at release time.
# Every nix job has a timeout so a hung installer/build can never require a
# manual cancel; the Nix store is cached on Linux runners only (measured to
# help there, not on macOS).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # actions: write lets the cache step purge stale cache entries.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      # Cache the Nix store on Linux only (no measured speedup on macOS).
      - name: Cache Nix store
        if: runner.os == 'Linux'
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'go.sum', 'editors/vscode/package-lock.json') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
          # Collect garbage down to ~3G before saving a new cache.
          gc-max-store-size-linux: 3G
          # Purge stale entries for this key prefix so the cache stays under
          # GitHub's 10G limit; never purge the current primary key.
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never
      - run: nix flake check --print-build-logs
      - name: Build devshell (the only source of go/node for development)
        run: nix develop --command go version
