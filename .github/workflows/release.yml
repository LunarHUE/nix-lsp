# Nix-first release pipeline: every platform that nix supports builds the
# server and its platform VSIX with a single `nix build .#vsix` (buildGoModule
# runs the full test suite in its check phase, so the build IS the gate).
# Windows is the one exception — nix does not run there, so it keeps a plain
# Go + npm job producing the same artifact shape. Runs on pushed v* tags AND
# on releases created in the GitHub UI (including prereleases — the UI flow
# fires a `release` event, not a tag push); either way the artifacts attach
# to the release, preserving its prerelease flag. A workflow_dispatch run
# builds artifacts only (no release to attach to). Marketplace publishing is
# a manual `vsce publish` on the produced VSIXes (or add VSCE_PAT later).
# Every job has a timeout so a hung nix installer/build can never require a
# manual cancel; the Nix store is cached on Linux runners only (measured to
# help there, not on macOS).
name: release

on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          # Intel macOS is not built: the plain macos-* labels are arm64-only
          # (x86_64 needs macos-15-intel / *-large labels, and GitHub is
          # deprecating x86_64 macOS after macOS 15 retires). If darwin-x64 is
          # ever needed, add a macos-15-intel matrix entry while it lasts, or
          # build via Rosetta with nix extra-platforms on arm64.
          - os: macos-15
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # actions: write lets the cache step purge stale cache entries.
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      # Cache the Nix store on Linux only (no measured speedup on macOS).
      - name: Cache Nix store
        if: runner.os == 'Linux'
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'go.sum', 'editors/vscode/package-lock.json') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
          # Collect garbage down to ~3G before saving a new cache.
          gc-max-store-size-linux: 3G
          # Purge stale entries for this key prefix so the cache stays under
          # GitHub's 10G limit; never purge the current primary key.
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Build platform VSIX (tests run in the nix check phase)
        run: nix build .#vsix --print-build-logs

      - name: Stage artifacts
        run: |
          cp result/nixls-${{ matrix.target }}.vsix .
          nix build .#nixls
          cp result/bin/nixls nixls-${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: nixls-${{ matrix.target }}
          path: |
            nixls-${{ matrix.target }}.vsix
            nixls-${{ matrix.target }}

  # Windows cannot run nix; build the same artifact shape with Go + npm.
  windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build server
        shell: bash
        run: |
          go test ./...
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME:-dev}" -o editors/vscode/bin/nixls.exe ./cmd/nixls
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Package platform VSIX
        shell: bash
        working-directory: editors/vscode
        run: |
          npm ci
          npm run compile
          npx @vscode/vsce package --target win32-x64 --allow-missing-repository -o nixls-win32-x64.vsix
      - name: Stage artifacts
        shell: bash
        run: |
          cp editors/vscode/nixls-win32-x64.vsix .
          cp editors/vscode/bin/nixls.exe nixls-win32-x64.exe
      - uses: actions/upload-artifact@v7
        with:
          name: nixls-win32-x64
          path: |
            nixls-win32-x64.vsix
            nixls-win32-x64.exe

  release:
    needs: [nix, windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      # On a `release` event this updates the existing (pre)release in place,
      # keeping its prerelease flag; on a tag push it creates the release.
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: |
            *.vsix
            nixls-*
